<doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles/sharedStyles.css" />

		<style>
	
			#btn-2 {
				margin-left:auto;
			}

			#btn-3 {
				margin-left:auto;
				margin-right:auto;
			}
		
			#btn-1 {
				margin-left:1em;
			}	
		
			#btn-2 {
				margin-right:1em;
			}
		
			#main-buttons-1,#main-buttons-2 {
				display:flex;
			}		


			@media not screen and (width < 32em) {
				#btn-2 {
					margin-right:1em;
				}
				#btn-1,#btn-2 {
					position:relative;
					top:-11em;
				}
				#btn-3 {
					position: relative;
					top:-5em;
				}
				#btn-1,#btn-2,#btn-3 {
					font-size: var(--size-6xl);
				}	
				#support-header {
					margin-top: -7.5em;
				}
			}
			
			@media screen and (width < 32em) {	
				#btn-1,#btn-2 {
					position:relative;
					top: -10em;
				}
				#btn-3 {
					position:relative;
					top: -5em;
				}			
				#main-header, #support-header{
					text-align: center;
				}
				#support-header {
					margin-top: -2.5em;
				}
			}
		</style>
		<title>Create Third Places</title>	
	</head>
  <body>

		{{>navbar}}	
		<div id="container" class="container-xl">
			
			<h1 id="main-header">Imagine a public space that is:</h1> 
				<div id="image-div">
					<img id="homepage-image" src="/images/places/crystal_city_landing_2016.jpg"></img>
					<div class="container-xl" id="main-buttons-1"> 
						<a id="btn-1" class="btn" href="/articles/goodThirdPlace.html">Free to use</a>
						<a id="btn-2" class="btn" href="/articles/goodThirdPlace.html">Open 24/7</a>	
					</div>	
					<div class="container-xl" id="main-buttons-2">
						<a id="btn-3" class="btn" href="/articles/goodThirdPlace.html">Large enough for 100 people</a>
					</div>	
				</div> 
				<h1 class="callout primary" id = "support-header">You can help make that space a reality</h1>	
				<div class="display-section callout secondary" id="support-section"> 
					{{>actions}}
				</div>	
			</div>
	 </div> 
	{{>footer}}

  </body>
</html>

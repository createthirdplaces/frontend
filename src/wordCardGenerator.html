<head>
  <meta charset="UTF-8">

  <title>Toaster Trouble Board Game</title>
	
	<script type="module">

		import {blockJavaScriptFunctions} from "/js/bots/block.js"
		
		const veryEasyWords = [
			'Virginia',
			'Arlington',
			'Dog',
			'Cat',

			'Washington'
			//Add more words	
		]	
	
		const easyWords = [

			'Coffee',
			'Water',

			'Table',
			'Hotel',
			'Pie',
			'Beach',

			'Egg',

		const mediumWords = [
			'England',
			'Bowser',
			'Mickey',
			'Uno',
			'Jenga',
			'Manhattan',
			'Batman',
			'Western',

			'Istanbul',

		];
		
		const hardWords = [
			'Imaginary',
			'Queens',
			'Lannister',
			'Mali',
			'Persian',
			'Sodosopa',
			'Gorbachev',

			'Watermark',
			'Scrooge',
			'Delfino',
			'Theon',
			'Waterfront',
			'Mewtwo' ]
		
		function createCardHtml(wordList){
			let html = `<div class="card"><ol>
				`;
			for(let i=0;i<wordList.length;i++){
				html+=`<li>${wordList[i]}</li>`;
			}
			html+=`</ol></div>`;
			return html;
		}
	
		window.addEventListener("load",()=>{
		
			
			let html=""	
		
			let i = 0;	
			while(true){	
			
				let cardWords = [];
				if(i < veryEasyWords.length){
					cardWords.push(veryEasyWords[i]);
				}
				
				if(i<easyWords.length){
					cardWords.push(easyWords[i])
				}
				

				if(i*2<mediumWords.length){
					cardWords.push(mediumWords[i*2])
				}
				
				if(i*2+1<mediumWords.length){
					cardWords.push(mediumWords[i*2+1])
				}

				cardWords = cardWords.concat(hardWords.slice(i,Math.min(i+1, hardWords.length)));	

				if(cardWords.length === 0){
					break;
				}
				i++;
				html+= createCardHtml(cardWords);
			}
			
			document.getElementById("print-container")
				.innerHTML = html;
			
			console.log(veryEasyWords.length);
			console.log(easyWords.length);
			console.log(mediumWords.length/2);
			console.log(hardWords.length);
			
			blockJavaScriptFunctions();	
		});


	</script>

		.print-container {
			position:relative
		}	
		@media print {

			}

		@page {

			margin: 2mm 2mm 2mm 2mm;
		}
	</style>

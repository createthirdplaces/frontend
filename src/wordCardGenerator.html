<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <title>Toaster Trouble Board Game</title>
	
	<script type="module">

		import {blockJavaScriptFunctions} from "/js/bots/block.js"
		
		const wordList = [
			'one',
			'two',
			'three',
			'four',
			'five',
			'six',
			'seven'
		];
		
		function createCardHtml(wordList){
			let html = `<div class="card"><ol>
				`;
			for(let i=0;i<wordList.length;i++){
				html+=`<li>${wordList[i]}</li>`;
			}
			html+=`</ol></div>`;
			return html;
		}
	
		window.addEventListener("load",()=>{
		
			const wordsPerCard=1;	
			
			let html=""	
			
			for(let i=0;i<wordList.length;i+=wordsPerCard){
			
				const cardWords = wordList.slice(i,Math.min(i+wordsPerCard, wordList.length));
				html+= createCardHtml(cardWords);
			}
			
			document.getElementById("print-container")
				.innerHTML = html;
			
			console.log(html);
			
			blockJavaScriptFunctions();	
		});


	</script>
	<style>
		body {
			margin:0px;
		}
		.card {
			display:inline-block;
			height: 336px;	
			width: 200px;	
			border: 10px solid black;
			vertical-align:top;	
		}

		.print-container {
			position:relative
		}	
		@media print {
			footer,nav,.web-only {	
				display:none;
			}	
		}
		@page {
			size: portrait;	
			margin: 2mm 2mm 2mm 2mm;
		}
	</style>
</head>
<body>
		{{>navbar}}	
		
		<div class="container-xl" > 
			<div class="web-only">	
			<h1>Word card generator</h1>

				<p>This page generates printable cards with words on them. It is designed games such
				as<a
																																										href="https://boardgamegeek.com/boardgame/254640/just-one">Just
																																										One
																																										Game</a> 
			</div>	
			<div id="print-container">
			</div>

			<div id="bot-container"></div>  
	</div>
  {{>footer}}

</body>
</html>

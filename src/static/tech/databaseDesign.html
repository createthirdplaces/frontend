
<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/styles/sharedStyles.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script defer fetchpriority="low" type="module">
    import {BaseDynamicComponent} from "../../shared/lib/places-js-latest.js"
    import {GetGameAdvice} from "../../bots/getGameAdvice.js";
    GetGameAdvice();
    export class DatabaseDesignComponent extends BaseDynamicComponent{


      attachHandlersToShadowRoot(shadowRoot) {

        const currentUrl = window.location.href.split('?')[0]
        let shouldChangeUrl = false;
        shadowRoot.addEventListener("click",()=>{
          shouldChangeUrl = true;
        })

        shadowRoot.querySelectorAll("details").forEach((item)=>{
          item.addEventListener("toggle",(event)=>{

            if(shouldChangeUrl){
              const url = new URL(location);
              if(event.newState === "open"){
                url.searchParams.set(event.target.id, "show")
                window.history.pushState({},'',`${currentUrl}?${event.target.id}=show`)
              } else {
                window.history.pushState({},'', currentUrl)
              }
              shouldChangeUrl = false;
            }
          })
        })
      }

      getTemplateStyle(){
        return `
          <link rel="stylesheet" href="/styles/sharedStyles.css" />

          <style>

          </style>
        `
      }
      render(){

        const urlParams = new URLSearchParams(document.location.search);

        return `
              <h1>Database Design</h1>

             <p>This is an example of how data for the decentralized architecture can be stored in a relational
             database, and it exists as a starting point for developers. It is not necessary to precisely follow this
             example as interaction between different websites is defined by API endpoints.</p>

             <details id="database-tables-aggregator" ${urlParams.get("database-tables-aggregator") ? "open" : ''}>
              <summary>Database table for aggregator websites </summary>

              <h2>Group aggregation table</h2>
              <ul>
                <li><b>group_uuid</b>: UUID of group</li>
                <li><b>local_website_url</b>: API url for local website group is from</li>
              </ul>
            </details>


            <details id="database-tables-local" ${urlParams.get("database-tables-local") ? "open" : ''}>
              <summary>Database tables for local websites </summary>

              <h2>Aggregators table</h2>
              <ul>
                <li><b>aggregator_url(Primary key)</b>: URL of aggregator website</li>
              </ul>

              <h2>Events table</h2>
              <ul>
                <li><b>group_id(Foreign key)</b>: Represents the id of the group the event is for.</li>
              </ul>

              <h2>Groups table</h2>
              <ul>
                <li><b>uuid(Primary key)</b>: A randomly generated id that is a unique identifier for a group.</li>
              </ul>

              <h2>Events table</h2>
              <ul>
                <li><b>group_id(Foreign key)</b>: Represents the id of the group the event is for.</li>
              </ul>

            </details>


          `
      }
    }
    customElements.define('database-design-component', DatabaseDesignComponent)

  </script>
  <title>Database Design</title>
</head>
<body>
<div id="container">
  {{>navbar}}
  <database-design-component></database-design-component>

</div>
<div id="bot-container"></div>

</body>
</html>

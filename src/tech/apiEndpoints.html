
<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles/sharedStyles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script defer fetchpriority="low" type="module">
      import {BaseDynamicComponent} from "../js/shared/lib/places-js-latest.js"
      import {GetGameAdvice} from "../js/bots/getGameAdvice.js";
      GetGameAdvice();
      export class ApiEndpointComponent extends BaseDynamicComponent{


        attachHandlersToShadowRoot(shadowRoot) {

          const currentUrl = window.location.href.split('?')[0]
          let shouldChangeUrl = false;
          shadowRoot.addEventListener("click",()=>{
            shouldChangeUrl = true;
          })

          shadowRoot.querySelectorAll("details").forEach((item)=>{
            item.addEventListener("toggle",(event)=>{

              if(shouldChangeUrl){
                const url = new URL(location);
                if(event.newState === "open"){
                  url.searchParams.set(event.target.id, "show")
                  window.history.pushState({},'',`${currentUrl}?${event.target.id}=show`)
                } else {
                  window.history.pushState({},'', currentUrl)
                }
                shouldChangeUrl = false;
              }
            })
          })
        }

        getTemplateStyle(){
          return `
          <link rel="stylesheet" href="/styles/sharedStyles.css" />

          <style>

          </style>
        `
        }
        render(){

          const urlParams = new URLSearchParams(document.location.search);

          return `
              <h1>API endpoints</h1>

              <p>
                This page contains API endpoint information for the Create Third Places decentralized events architecture.
                The API endpoints area designed to specify how websites should interact with each other in a manner
                similar to how <a href = "https://activitypub.rocks">ActivityPub</a> specifies how social media websites
                 should interact. Create Third Places does not specify how a website works internally.
               </p>


              <p>
                  Email gulu@createthirdplaces.org, or create an <a href="https://codeberg.org/createthirdplaces/frontend/issues">
                 issue</a> here to recommend a change. Source code for the documentation is
                 <a href="https://codeberg.org/createthirdplaces/frontend/tree/main/srctech">here</a>.
              </p>

              <h2>Endpoints for group websites</h2>


           <details id="remove-aggregator" ${urlParams.get("remove-aggregator") ? "open" : ''}>
                <summary>DELETE /aggregator/</summary>

                <p>This endpoint will be used to remove an aggregator from an event website.</p>

                <h3>Request body parameters</h3>
                <ul>
                  <li><b>url:</b>The url of the aggregator.</li>
                </ul>


                <h3>Error codes</h3>
                <ul>
                  <li><b>400</b>: Invalid parameter.</li>
                  <li><b>401</b>: Aggregator is not registered.</li>
                  <li><b>500</b>: Other server error.</li>
                </ul>

              </details>

              <details id="four" ${urlParams.get("four") ? "open" : ''}>
                <summary>POST /groups/</summary>
                <p>This endpoint will be used to retrieve data about a group.</p>

                <h3>Request body parameter</h3>
                <p><b>groupId</b>: UUID of group </p>

                 <p>Error responses</p>

                 <ul>
                  <li><b>400</b>: Invalid parameter.</li>
                  <li><b>401</b>: Unauthorized request.</li>
                  <li><b>404</b>: Group with UUID does not exist.</li>
                  <li><b>500</b>: Other server error.</li>
                </ul>
              </details>

              <details id="one" ${urlParams.get("one") ? "open" : ''}>
                <summary>POST /aggregator/</summary>

                <p>This endpoint will be used to register an aggregator. If this 
                endpoint is on a site that is also an aggregator, then the called
                aggregator url will be returned with a success response.</p>
      

                <h3>Request body parameters</h3>
                <ul>
                  <li><b>level:</b>The level of the aggregator.</li>
                  <li><b>url:</b>The url of the aggregator.</li>
                </ul>

                <h3>Success response parameters</h3>
                <ul>
                  <li><b>url</b>: The url of the website.</li>
                </ul>

                <h3>Error codes</h3>
                <ul>
                  <li><b>400</b>: Invalid parameter.</li>
                  <li><b>401</b>: The aggregator registeration request is unauthorized.</li>
                  <li><b>500</b>: Other server error.</li>
                </ul>

              </details>
              <h2>Endpoints for aggregator website</h2>

              <details id="six" ${urlParams.get("six") ? "open" : ''}>
                <summary>POST /updates/</summary>
                <p>This endpoint will be used by aggregator websites to submit updates</p>
              </details>

              <h3>Request body parameter</h3>
                <ul>
                  <li><b>eventUpdates</b>: A map of event updates with the key being the UUID and the value being the updated event data.</li> 
								  <li><b>groupUpdates</b>: A map of group updates with the key being the UUID and the value being the updated event data.</li>
								  <li><b>deletedEvents</b>: UUIDs of events that have been deleted.</li>
								  <li><b>deletedGroups</b>: UUIDs of groups that have been deleted.</li> 
							  </ul>

                <h3>Error codes</h3>
                <ul>
                  <li><b>400</b>: Invalid parameter.</li>
                  <li><b>500</b>: Other server error.</li>
                </ul>



              <h2>Other notes</h2>

              <details id="prevent-circular-dependency" ${urlParams.get("prevent-circular-dependency") ? "open" : ''}>
                <summary>Preventing circular dependencies</summary>
                <p>Since it is possible for aggregators to also have their own groups and events, it is
                   necessary to have logic to prevent circular dependencies. This will be done by checking
                   the group_websites table. If the website making an aggregation request is already
                   in the group_websites table, then the aggregation request will be rejected.</p>
              </details>
              
              <details id="aggregator-multiple-levels" ${urlParams.get("aggregator-multiple-levels") ? "open" : ''}>
                <summary>Multiple aggregator levels</summary>
      
                <p>If a top level aggregator is trying to retrieve data from a group website that is a lower level aggregator,
                  then the lower level website aggregator should store event data.</p>
              </details>
              <details id="five" ${urlParams.get("five") ? "open" : ''}>
                <summary>Structure of an event response object</summary>
                <code>
                  <pre>
  {
   "id":"0935d8a5-4221-4de5-87fd-6bddc358a5f8",
   "description":"The group will be meeting at the Crystal City Shops outside We The Pizza.",
   "name":"Bring Your Own Games Night at the Crystal City Shops next to We the Pizza",
   "url":"https://dmvboardgames.com/",
   "startDate":"",
   "endDate":"",
   "eventLocation":{
      "city":"Arlington",
      "state":"VA",
      "streetAddress":"2911 Crystal Drive",
      "zipCode":22202
   },
   "groupName":"A board game group",
   "groupId":"465b1e02-4674-4e89-bfd0-9f66f40a6d7c",
   "permissions":{
      "userCanEdit":false,
      "userCanRsvp":false
   },
   "isRecurring":true,
   "startTime":"07:00 PM",
   "endTime":"10:00 PM",
   "image":null,
   "imageFilePath":null,
   "rsvpCount":0,
   "userHasRsvp":false,
   "moderators":[
     "Bharat"
   ],
   "day":"Friday",
}
                  </pre>
                </code>
              </details>

              <h2>Notes about possible updates</h2>

             <details>
              <summary>Preventing unauthorized requests from aggregators</summary>
              <p>This decentralized architecture could need to specify a way to make sure only authorized clients are able to retrieve
              data. Here are a couple of ways this could be done. </p>
              <ul>
                <li><b>Have the events endpoint check the origin of the request, and block any request that are not
                whitelisted.</b> While this will be straightforward to implement, there is a risk from attempts to
                spoof the origin.</li>
                <li><b>Generate an API key for each aggregator</b>. This would involve more complexity than
                 checking the origin of a request. However, using an API key would be more secure, especially with
                 a requirement to rotate the API key.</li>
              </ul>

            <p>It might also be a good idea to make sure individual event websites can choose the level of security
            they want, either by using one of the methods listed above, or some sort of other authentication mechanism.
             Ease of access might be a higher priority for some event websites over restricting access. Also,
            unauthorized access may not be a concern for a new event website due to a lack of visibility. The goal of
            read-only access control is to make sure that API endpoints are not overloaded. </p>

            <p>To prevent overloading, it could also be useful to recommend rate limiting.</p>
             </details>


          `
        }
      }
      customElements.define('api-endpoint-component', ApiEndpointComponent)

    </script>
    <title>API endpoints</title>
  </head>
  <body>
    <div id="container">
      {{>navbar}}
      <api-endpoint-component></api-endpoint-component>

    </div>
    <div id="bot-container"></div>
    {{>footer}}

  </body>
</html>

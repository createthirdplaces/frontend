<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" type="text/css" href="/styles/sharedStyles.css" />

    <style>
		  body {
				background-image: none;
			}	
			h2 {
					margin-top:1rem;
			}
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Using places.js for an location listing component</title>
    <script type="module">
      import {AddMapGuideComponent} from "/tech/placesjs/guides/tutorial/AddMapGuideComponent.js";
      import {BaseCodeDisplayComponent} from "/js/content/framework/codeGuides/shared/BaseCodeDisplayComponent.js";
      import {CreateListGuideComponent} from "/tech/placesjs/guides/tutorial/CreateListGuideComponent.js";
      import {HtmlCodeDisplayComponent} from "/js/content/framework/codeGuides/shared/HtmlCodeDisplayComponent.js";
      import {LocationListingTutorialComponent} from
      "/tech/placesjs/guides/tutorial/LocationListingTutorialComponent.js";
      import {MapUpdateGuidePartOne} from
      "/tech/placesjs/guides/tutorial/MapUpdateGuidePartOne.js";
      import {SetupGuideComponent} from "/tech/placesjs/guides/tutorial/SetupGuideComponent.js";
      import {SetupStepOneComponent} from "/tech/placesjs/guides/tutorial/SetupStepOneComponent.js";

      customElements.define('add-map-guide-component', AddMapGuideComponent)
      customElements.define('base-code-display-component',BaseCodeDisplayComponent);
      customElements.define('create-list-guide-component',CreateListGuideComponent);
      customElements.define('html-code-display-component',HtmlCodeDisplayComponent);
      customElements.define('location-listing-tutorial-component',LocationListingTutorialComponent);
      customElements.define('map-update-guide-part-one', MapUpdateGuidePartOne);
      customElements.define('setup-guide-component',SetupGuideComponent);
      customElements.define('setup-step-one-component',SetupStepOneComponent);
    </script>
  </head>
  <body>
    <div class="section-div container-xl" id="container">
      {{>navbar}}
      <location-listing-tutorial-component></location-listing-tutorial-component>
    </div>
    <div id="bot-container"></div>
    {{>footer}}

  </body>
</html>
